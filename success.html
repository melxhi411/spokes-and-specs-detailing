<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | Spokes & Specs</title>
    <style>
        :root {
            --apple-black: #000000;
            --apple-dark-grey: #121214;
            --luxury-gold: #d4af37;
            --pure-white: #ffffff;
            --muted-gray: #8e8e93;
            --border-tint: rgba(255, 255, 255, 0.06);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--apple-black);
            color: var(--pure-white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .success-card {
            background-color: var(--apple-dark-grey);
            padding: 40px;
            border-radius: 14px;
            border: 1px solid var(--border-tint);
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .icon-wrapper {
            width: 60px;
            height: 60px;
            background-color: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--luxury-gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
        }
        .icon-wrapper span {
            color: var(--luxury-gold);
            font-size: 28px;
            font-weight: bold;
        }
        h2 { 
            color: var(--pure-white); 
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 10px;
        }
        p { 
            color: var(--muted-gray); 
            font-size: 15px; 
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .details-box {
            background-color: rgba(255,255,255,0.02);
            border: 1px solid var(--border-tint);
            border-radius: 8px;
            padding: 20px;
            text-align: left;
            margin-bottom: 30px;
        }
        .detail-item {
            margin-bottom: 12px;
            font-size: 14px;
        }
        .detail-item:last-child {
            margin-bottom: 0;
        }
        .detail-item strong {
            color: var(--luxury-gold);
            display: inline-block;
            width: 130px;
        }
        .detail-item span {
            color: var(--pure-white);
        }
        .home-btn {
            background-color: var(--pure-white);
            color: var(--apple-black);
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .home-btn:hover {
            background-color: var(--luxury-gold);
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="icon-wrapper">
        <span>✓</span>
    </div>
    <h2>Booking Confirmed</h2>
    <p>Spokes & Specs will be in contact with you soon to finalize your arrival details.</p>
    
    <div class="details-box">
        <div class="detail-item">
            <strong>Vehicle Model:</strong> <span id="confirm-vehicle">Loading...</span>
        </div>
        <div class="detail-item">
            <strong>Package Selected:</strong> <span id="confirm-package">Loading...</span>
        </div>
    </div>
    
    <a href="./index.html" class="home-btn">Return Home</a>
</div>

<script>
    // Pull the data parameters cleanly out of the link redirect context URL
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('confirm-vehicle').innerText = urlParams.get('vehicle') || 'N/A';
    document.getElementById('confirm-package').innerText = urlParams.get('package') || 'N/A';
</script>

</body>
</html>
